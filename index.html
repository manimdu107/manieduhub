            if (!CLOUDINARY_READY) {
                if (SERVER_HOSTED) {
                    throw new Error('Cloudinary: set CLOUDINARY_NAME and CLOUDINARY_PRESET in index.html (see the HTML comment above MANIEDUHUB_CONFIG). Dashboard: https://console.cloudinary.com');
                }
                return new Promise((resolve) => {
                    const r = new FileReader();
                    r.onload = ev => resolve(ev.target.result);
                    r.readAsDataURL(file);
                });
            }
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_PRESET);
            if (CLOUDINARY_FOLDER) formData.append('folder', CLOUDINARY_FOLDER);
            const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_NAME}/image/upload`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "Upload failed");
            return data.secure_url;
        };

        /** Normalize quiz items (embedded data uses questionText/answerOptions; UI uses q/o/c). */
        const normalizeQuizQuestion = (raw) => {
            if (!raw) return { q: '', o: [], c: 0 };
            if (raw.q != null && Array.isArray(raw.o)) {
                return { q: String(raw.q), o: raw.o.map((x) => String(x)), c: Math.max(0, Number(raw.c) || 0) };
            }
            const opts = raw.answerOptions || [];
            const c = opts.findIndex((a) => a && a.isCorrect);
            const o = opts.length ? opts.map((a) => (a && a.answerText != null ? String(a.answerText) : '')) : (Array.isArray(raw.o) ? raw.o.map(String) : []);
            return { q: String(raw.questionText || raw.q || ''), o, c: c >= 0 ? c : Math.max(0, Number(raw.c) || 0) };
        };

            if (!data || typeof data !== 'object') return data;

                    for (const t of Object.keys(data[s][u])) {

                        out[s][u][t] = Array.isArray(arr) ? arr.map(normalizeQuizQuestion) : arr;

                    { text: "Sexually transmitted diseases (AIDS, Syphilis, Gonorrhoea) (PDF)", url: "https://drive.google.com/drive/folders/1D_ALPaj-x0i7iCONc-3Fun4z-dwE7Esa?usp=drive_link" }
                ]
            }
        ];

        const SESSION_USER_KEY = 'manieduhub_session_user';
        const DEFAULT_EMBED_VIDEO = 'https://www.youtube.com/embed/videoseries?list=UUFMyvEAeVD5RsFd1gEv6D7w';
        const DEFAULT_LIBRARY = {
            Pharmacology: [{ title: 'Pharmacology Essentials', author: 'K.D. Tripathi', color: '#6366f1', url: 'https://drive.google.com' }],
            Pathophysiology: [{ title: 'Pathophysiology', author: 'Robbins', color: '#06b6d4', url: 'https://drive.google.com' }]
        };
        const defaultAboutData = () => ({
            name: 'C. Mani Murugan',
            title: 'Assistant Professor',
            description: 'My mission is to transform the complex world of pharmacy into an engaging digital experience. Together, we will bridge the gap between theory and excellence.',
            imageUrl: 'photo/IMG_4521.JPG',
            social: { instagram: '@manimurugan', linkedin: 'manimurugan-pharm', phone: '+91 123 456 7890', email: 'mani@manieduhub.com', youtube: 'ManieduHub' }
        });
        function readSessionUser() {
            if (!SERVER_HOSTED) return null;
            try {
                const raw = sessionStorage.getItem(SESSION_USER_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch {
                return null;
            }
        }
        function writeSessionUser(u) {
            if (!SERVER_HOSTED) return;
            if (u) sessionStorage.setItem(SESSION_USER_KEY, JSON.stringify(u));
            else sessionStorage.removeItem(SESSION_USER_KEY);
        }

        const App = () => {
            const [user, setUser] = useState(() => readSessionUser());
            const [isAdmin, setIsAdmin] = useState(false);
            const [adminKey, setAdminKey] = useState('');
            const [activeTab, setActiveTab] = useState('home');
            const [navOpen, setNavOpen] = useState(false);
            const [booting, setBooting] = useState(() => apiUrl('/api/config') != null);
            const [cloudOk, setCloudOk] = useState(false);
            const [loadError, setLoadError] = useState(false);
            const [fetchDebug, setFetchDebug] = useState({ tried: '', detail: '' });

            const [subjects, setSubjects] = useState(() => ({ pharmacology: fullPharm, pathophysiology: fullPath }));
            const [library, setLibrary] = useState(() => DEFAULT_LIBRARY);
            const [quizzes, setQuizzes] = useState(() => mapQuizData({ ...fullQuiz }));
            const [students, setStudents] = useState(() => []);
            const [leaderboards, setLeaderboards] = useState(() => ({}));
            const [notifications, setNotifications] = useState(() => []);
            const [videoLink, setVideoLink] = useState(() => DEFAULT_EMBED_VIDEO);
            const [aboutData, setAboutData] = useState(() => defaultAboutData());
            const [aiLinks, setAiLinks] = useState(() => fullAiLinks);

            useEffect(() => { initThree(); }, []);

            useEffect(() => {
                const url = apiUrl('/api/config');
                if (!url) {
                    setBooting(false);
                    return;
                }
                const absoluteUrl = url.startsWith('http')
                    ? url
                    : (typeof window !== 'undefined' ? `${window.location.origin}${url.startsWith('/') ? '' : '/'}${url}` : url);
                let cancelled = false;
                fetch(url)
                    .then((r) => (r.ok ? r.json() : Promise.reject(new Error(`HTTP ${r.status}`))))
                    .then((cfg) => {
                        if (cancelled) return;
                        setCloudOk(true);
                        setLoadError(false);
                        setFetchDebug({ tried: '', detail: '' });
                        if (cfg.library != null) setLibrary(cfg.library);
                        if (cfg.quizzes != null) setQuizzes(mapQuizData({ ...fullQuiz, ...cfg.quizzes }));
                        if (cfg.leaderboards != null && typeof cfg.leaderboards === 'object') setLeaderboards(cfg.leaderboards);
                        if (cfg.notifications != null && Array.isArray(cfg.notifications)) setNotifications(cfg.notifications);
                        if (cfg.videoLink != null) setVideoLink(cfg.videoLink);
                        if (cfg.aboutData != null && typeof cfg.aboutData === 'object') {
                            setAboutData((prev) => ({ ...prev, ...cfg.aboutData, social: { ...prev.social, ...(cfg.aboutData.social || {}) } }));
                        }
                        if (cfg.aiLinks != null && Array.isArray(cfg.aiLinks)) setAiLinks(cfg.aiLinks);
                        if (cfg.subjects != null && typeof cfg.subjects === 'object') {
                            setSubjects((prev) => ({ ...prev, ...cfg.subjects, pharmacology: fullPharm, pathophysiology: fullPath }));
                        }
                        if (cfg.students != null && Array.isArray(cfg.students)) setStudents(cfg.students);
                    })
                    .catch((err) => {
                        if (!cancelled) {
                            setCloudOk(false);
                            setLoadError(true);
                            setFetchDebug({
                                tried: absoluteUrl,
                                detail: err && err.message ? err.message : 'Failed to fetch (server not running or wrong URL?)',
                            });
                        }
                    })
                    .finally(() => {
                        if (!cancelled) setBooting(false);
                    });
                return () => { cancelled = true; };
            }, []);

            useEffect(() => {
                if (!isAdmin || !adminKey) return;
                const base = apiUrl('/api/admin/content');
                if (!base) return;
                const t = setTimeout(() => {
                    fetch(base, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json', 'X-Admin-Key': adminKey },
                        body: JSON.stringify({
                            library, quizzes, leaderboards, notifications, videoLink, aboutData, aiLinks, subjects
                        })
                    }).catch(() => {});
                }, 2000);
                return () => clearTimeout(t);
            }, [isAdmin, adminKey, library, quizzes, leaderboards, notifications, videoLink, aboutData, aiLinks, subjects]);

            const pushLeaderboardCloud = useCallback(async (lid, board) => {
                const u = apiUrl('/api/leaderboard/submit');
                if (!u) return;
                try {
                    const r = await fetch(u, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ lid, leaderboard: board })
                    });
                    if (r.ok) {
                        const j = await r.json();
                        if (j.leaderboards) setLeaderboards(j.leaderboards);
                    }
                } catch (_) { /* offline */ }
            }, [setLeaderboards]);

            const activeStudent = user ? students.find(s => s.email === user.email) : null;
            if (user && activeStudent && activeStudent.blocked) { setUser(null); writeSessionUser(null); alert("Account Blocked"); }

            if (!SERVER_HOSTED) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center gap-6 bg-[#020617] text-white px-4">
                        <div className="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center font-black text-2xl text-white">M</div>
                        <h1 className="text-2xl md:text-3xl font-black tracking-tight">Open this site from your server</h1>
                        <p className="text-slate-400 max-w-lg text-sm leading-relaxed">
                            Data is stored on the server only, not inside a saved HTML file. Run the backend on your computer or use your live hosting URL (for example <span className="text-white font-bold">http://localhost:3000</span> after <code className="text-primary">npm start</code>).
                        </p>
                    </div>
                );
            }

            if (apiUrl('/api/config') && loadError && !booting) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center p-8 text-center gap-8 bg-[#020617] text-white px-4 max-w-lg mx-auto">
                        <div className="w-16 h-16 rounded-2xl bg-accent/20 border border-accent/40 flex items-center justify-center text-accent font-black text-xl">!</div>
                        <div className="space-y-2">
                            <h1 className="text-2xl font-black">Cannot reach the server</h1>
                            <p className="text-slate-400 text-sm leading-relaxed">The page could not load classroom data from the API.</p>
                        </div>
                        {fetchDebug.tried && (
                            <div className="w-full text-left glass rounded-2xl p-4 border border-white/10 space-y-2">
                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-500">Request tried</p>
                                <p className="text-xs font-mono text-primary break-all">{fetchDebug.tried}</p>
                                {fetchDebug.detail && <p className="text-xs text-amber-200/90 pt-1">{fetchDebug.detail}</p>}
                            </div>
                        )}
                        <ol className="w-full text-left text-sm text-slate-300 space-y-3 list-decimal list-inside glass rounded-2xl p-5 border border-white/10">
                            <li>Open a terminal in your project folder (where <code className="text-primary">package.json</code> is).</li>
                            <li>Run <code className="text-primary">npm install</code> once, then <code className="text-primary">npm start</code>.</li>
                            <li>In the browser, open <strong className="text-white">http://localhost:3000</strong> (same address as the API). Or double‑click <code className="text-primary">start-local.bat</code> if you use it, then that URL.</li>
                            <li>If you use Live Server or another port, set <code className="text-primary">API_BASE</code> in <code className="text-primary">MANIEDUHUB_CONFIG</code> in <code className="text-primary">index.html</code> to your API root, e.g. <code className="text-primary whitespace-nowrap">http://localhost:3000</code>.</li>
                        </ol>
                        <button type="button" onClick={() => window.location.reload()} className="px-10 py-4 bg-primary text-white rounded-2xl font-black text-sm shadow-xl hover:opacity-95">Retry</button>
                    </div>
                );
            }

            if (booting) {
                return (
                    <div className="min-h-screen flex flex-col items-center justify-center gap-6 animate-fade-in">
                        <div className="w-16 h-16 bg-primary rounded-2xl flex items-center justify-center font-black text-2xl text-white shadow-2xl shadow-primary/30">M</div>
                        <p className="text-slate-400 font-bold text-sm tracking-widest uppercase">Loading classroom…</p>
                    </div>
                );
            }

            if (!user && !isAdmin) return (
                <AuthPage
                    onAuth={async (u, isNew) => {
                        setUser(u);
                        writeSessionUser(u);
                        const url = apiUrl('/api/config');
                        if (url && isNew) {
                            try {
                                const r = await fetch(url);
                                if (r.ok) {
                                    const cfg = await r.json();
                                    if (cfg.students != null && Array.isArray(cfg.students)) setStudents(cfg.students);
                                }
                            } catch (_) { /* ignore */ }
                        }
                    }}
                    onAdmin={(key) => { setIsAdmin(true); setAdminKey(key); }}
                    students={students}
                />
            );

            return (
                <div className="min-h-screen">
                    {apiUrl('/api/config') != null && cloudOk && (
                        <div className="fixed top-20 left-0 right-0 z-40 mx-auto max-w-lg px-4">
                            <div className="glass border border-emerald-500/20 text-emerald-300/90 text-[10px] font-bold text-center py-2 rounded-2xl tracking-widest uppercase">Synced from server</div>
                        </div>
                    )}
                    <nav className="fixed top-0 w-full z-50 glass border-b border-white/10 min-h-[5rem] flex items-center px-4 md:px-6 py-3">
                        <div className="max-w-7xl mx-auto w-full flex justify-between items-center gap-4">
                            <div className="flex items-center gap-3 cursor-pointer shrink-0" onClick={() => { setActiveTab('home'); setNavOpen(false); }}>
                                <div className="w-10 h-10 bg-primary rounded-xl flex items-center justify-center font-black text-white">M</div>
                                <h1 className="text-lg md:text-xl font-black text-white">MANIEDUHUB</h1>
                            </div>
                            {!isAdmin && (
                                <>
                                    <div className="hidden lg:flex items-center gap-2 flex-1 justify-center">
                                        {['home', 'subject', 'library', 'quiz', 'notifications', 'lectures', 'ai'].map(t => (
                                            <button key={t} onClick={() => setActiveTab(t)} className={`px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 capitalize ${activeTab === t ? 'bg-white/10 text-white' : 'text-slate-400 hover:text-white'}`}>
                                                <Icon name={t} size={18} /> {t === 'ai' ? 'AI Hub' : t}
                                            </button>
                                        ))}
                                    </div>
                                    <button type="button" className="lg:hidden glass px-4 py-3 rounded-xl text-white font-black text-xs uppercase" onClick={() => setNavOpen((o) => !o)}>Menu</button>
                                </>
                            )}
                            <div className="flex items-center gap-3 shrink-0">
                                {isAdmin ? <div className="bg-accent/20 px-3 py-1.5 rounded-full border border-accent/30 text-[10px] md:text-xs font-bold text-accent flex items-center gap-2"><Icon name="lock" size={14}/> Admin</div> :
                                 <div className="flex items-center gap-2 bg-white/5 px-3 py-1.5 rounded-full border border-white/10 text-xs md:text-sm font-bold text-white max-w-[10rem] md:max-w-none">
                                    <img alt="" src={user.profileImage || user.img || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.email}`} className="w-8 h-8 rounded-full shrink-0" />
                                    <span className="hidden md:inline truncate">{user.name.split(' ')[0]}</span>
                                 </div>}
                                <button type="button" onClick={() => { setUser(null); setIsAdmin(false); setAdminKey(''); writeSessionUser(null); }} className="text-slate-500 hover:text-white p-2" aria-label="Log out"><Icon name="logout" size={20}/></button>
                            </div>
                        </div>
                    </nav>
                    {!isAdmin && (
                        <div className={`nav-drawer lg:hidden fixed top-0 right-0 bottom-0 w-[min(100%,20rem)] z-[60] glass border-l border-white/10 pt-24 px-6 flex flex-col gap-2 ${navOpen ? 'open' : ''}`}>
                            {['home', 'subject', 'library', 'quiz', 'notifications', 'lectures', 'ai'].map(t => (
                                <button key={t} onClick={() => { setActiveTab(t); setNavOpen(false); }} className={`px-4 py-4 rounded-xl text-left text-sm font-bold flex items-center gap-3 capitalize ${activeTab === t ? 'bg-primary text-white' : 'text-slate-300'}`}>
                                    <Icon name={t} size={20} /> {t === 'ai' ? 'AI Hub' : t}
                                </button>
                            ))}
                        </div>
                    )}
                    {navOpen && !isAdmin && <button type="button" className="lg:hidden fixed inset-0 z-[55] bg-black/60" aria-label="Close menu" onClick={() => setNavOpen(false)} />}
                    <main className="max-w-7xl mx-auto px-4 md:px-6 pt-28 md:pt-36 pb-20 animate-slide-up">
                        {isAdmin ? <AdminPortal data={{ subjects, library, quizzes, students, notifications, videoLink, aboutData, aiLinks }} setters={{ setSubjects, setLibrary, setQuizzes, setStudents, setNotifications, setVideoLink, setAboutData, setAiLinks }} cloud={{ adminKey }} /> :
                        <Fragment>
                            {activeTab === 'home' && <HomeSection onNav={setActiveTab} about={aboutData} leaderboards={leaderboards} />}
                            {activeTab === 'subject' && <SubjectHub data={subjects} />}
                            {activeTab === 'library' && <LibrarySection data={library} />}
                            {activeTab === 'quiz' && <QuizHub data={quizzes} user={user} leaderboards={leaderboards} setLeaderboards={setLeaderboards} pushLeaderboardCloud={pushLeaderboardCloud} />}
                            {activeTab === 'notifications' && <NotificationSection data={notifications} />}
                            {activeTab === 'lectures' && <VideosSection link={videoLink} />}
                            {activeTab === 'ai' && <AIHub data={aiLinks} />}
                        </Fragment>}
                    </main>
                </div>
            );
        };

        const AuthPage = ({ onAuth, onAdmin, students }) => {
            const [m, setM] = useState('choice');
            const [f, setF] = useState({ name: '', email: '', pass: '', profileImage: '' });
            const [err, setErr] = useState('');
            const [isUploading, setIsUploading] = useState(false);
            const handleImage = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                try {
                    const url = await uploadToCloudinary(file);
                    setF({...f, profileImage: url});
                } catch (e) {
                    setErr("Photo upload failed: " + e.message);
                } finally {
                    setIsUploading(false);
                }
            };
            const submit = async (e) => {
                e.preventDefault();
                setErr('');
                const regUrl = apiUrl('/api/register');
                const loginUrl = apiUrl('/api/login');

                if (m === 'signup') {
                    if (regUrl) {
                        try {
                            const res = await fetch(regUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ name: f.name, email: f.email, pass: f.pass, profileImage: f.profileImage || '' })
                            });
                            const data = await res.json().catch(() => ({}));
                            if (!res.ok) return setErr(data.error || 'Could not create account');
                            onAuth(data.user, true);
                        } catch (_) {
                            setErr('Network error — check that the server is running.');
                        }
                        return;
                    }
                    return setErr('Open the site from your server URL to create an account.');
                }
                if (m === 'login') {
                    if (loginUrl) {
                        try {
                            const res = await fetch(loginUrl, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ email: f.email, pass: f.pass })
                            });
                            const data = await res.json().catch(() => ({}));
                            if (!res.ok) return setErr(data.error || 'Invalid credentials');
                            onAuth(data.user, false);
                        } catch (_) {
                            setErr('Network error — cannot reach server.');
                        }
                        return;
                    }
                    return setErr('Open the site from your server URL to log in.');
                }
                if (m === 'admin') {
                    if (f.pass !== ADMIN_PASS) return setErr('Wrong Admin Key');
                    onAdmin(f.pass);
                    return;
                }
                if (m === 'forgot') {
                    const s = students.find(st => st.email === f.email);
                    if (!s) return setErr('Email not found');
                    return setErr('Password reset is handled on the server. Ask your administrator (they can use POST /api/admin/reset-password with the admin key).');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6">
                    <div className="max-w-md w-full glass p-10 rounded-[3.5rem] space-y-8 animate-slide-up text-center border-white/5">
                        <div className="space-y-2">
                            <h1 className="text-5xl font-black text-white tracking-tighter">MANIEDU<span className="text-gradient">HUB</span></h1>
                            <p className="text-slate-500 font-bold tracking-widest text-[10px] uppercase">Digital Learning Evolution</p>
                            {apiUrl('/api/config') != null && <p className="text-[10px] font-bold text-emerald-400/90 uppercase tracking-widest pt-1">Server accounts — data stored on the host</p>}
                        </div>
                        
                        {m === 'choice' ? (
                            <div className="grid gap-4 pt-6">
                                <button onClick={() => setM('login')} className="p-7 bg-primary text-white rounded-3xl font-black text-2xl shadow-2xl hover:scale-105 transition-all">Student Portal</button>
                                <button onClick={() => setM('admin')} className="p-7 glass text-white rounded-3xl font-black text-2xl border-white/10 hover:bg-white/5 transition-all">Admin Access</button>
                            </div>
                        ) : (
                            <form onSubmit={submit} className="space-y-5 text-left pt-4">
                                {m === 'signup' && (
                                    <div className="flex flex-col items-center mb-6">
                                        <div className="w-20 h-20 rounded-full border-2 border-dashed border-white/20 flex items-center justify-center relative overflow-hidden bg-white/5">
                                            {isUploading ? <div className="animate-spin text-primary"><Icon name="ai" size={30}/></div> : 
                                             f.profileImage ? <img src={f.profileImage} className="w-full h-full object-cover" /> : <Icon name="user" className="text-slate-500" />}
                                            <input type="file" onChange={handleImage} className="absolute inset-0 opacity-0 cursor-pointer" disabled={isUploading} />
                                        </div>
                                        <span className="text-[10px] font-bold mt-2 uppercase tracking-widest text-slate-500">
                                            {isUploading ? <span className="text-primary animate-pulse">Uploading to Cloudinary…</span> :
                                             f.profileImage ? <span className="text-green-500 flex items-center gap-1">✓ Photo on Cloudinary</span> :
                                             'Upload profile photo'}
                                        </span>
                                        {SERVER_HOSTED && !CLOUDINARY_READY && (
                                            <p className="text-[10px] text-amber-200/95 font-bold text-center leading-relaxed mt-3 px-1">
                                                Add <code className="text-white/90">CLOUDINARY_NAME</code> and <code className="text-white/90">CLOUDINARY_PRESET</code> in <code className="text-white/90">index.html</code> (see comment in page source).{' '}
                                                <a href="https://console.cloudinary.com" target="_blank" rel="noreferrer" className="text-primary underline">Open Cloudinary</a>
                                            </p>
                                        )}
                                        <input type="text" placeholder="Full Name" className="w-full bg-white/5 p-4 rounded-2xl text-white outline-none border border-white/5 mt-4" onChange={e => setF({...f, name: e.target.value})} required />
                                    </div>
                                )}
                                
                                <Fragment>
                                    <input type="email" placeholder="Email Address" className="w-full bg-white/5 p-4 rounded-2xl text-white outline-none border border-white/5" value={f.email} onChange={e => setF({...f, email: e.target.value})} required />
                                    {m !== 'forgot' && <input type="password" placeholder="Password / Admin Key" className="w-full bg-white/5 p-4 rounded-2xl text-white outline-none border border-white/5" onChange={e => setF({...f, pass: e.target.value})} required />}
                                </Fragment>

                                {err && <p className={`text-center font-bold text-xs py-3 rounded-xl border ${err.includes('administrator') ? 'text-sky-200 bg-sky-500/10 border-sky-500/30' : err.includes('Cloudinary') ? 'text-amber-100 bg-amber-500/15 border-amber-400/30' : 'text-accent bg-accent/10 border-accent/20'}`}>{err}</p>}
                                
                                <button disabled={isUploading} className={`w-full py-5 ${isUploading ? 'bg-slate-700' : 'bg-primary'} text-white rounded-2xl font-black text-xl shadow-xl hover:scale-[1.02] transition-transform`}>
                                    {isUploading ? 'Please Wait...' : m === 'login' ? 'Enter Classroom' : m === 'signup' ? 'Create Account' : m === 'forgot' ? 'Request help' : 'Login Admin'}
                                </button>
                                
                                <div className="flex flex-col gap-4 text-[11px] font-black uppercase tracking-widest text-slate-500 pt-4">
                                    <div className="flex justify-between w-full">
                                        <button type="button" onClick={() => { setM(m === 'login' ? 'signup' : 'login'); setErr(''); }}>{m === 'login' ? 'New Account? Signup' : 'Existing Account? Login'}</button>
                                        <button type="button" onClick={() => { setM('choice'); setErr(''); }}>Back</button>
                                    </div>
                                    {m === 'login' && <button type="button" onClick={() => { setM('forgot'); setErr(''); }} className="text-primary text-center hover:underline">Forgot Password?</button>}
                                </div>
                            </form>
                        )}
                    </div>
                </div>
            );
        };

        const HomeSection = ({ onNav, about, leaderboards }) => {
            const allScores = Object.values(leaderboards).flat().sort((a,b) => b.score - a.score).slice(0, 5);
            return (
                <div className="space-y-24">
                    <div className="glass p-20 rounded-[4rem] text-center space-y-10 relative overflow-hidden group border-white/5">
                        <div className="absolute inset-0 bg-gradient-to-br from-primary/10 via-transparent to-accent/10"></div>
                        <div className="relative z-10 space-y-10"><h2 className="text-7xl md:text-9xl font-black text-white tracking-tighter drop-shadow-2xl">MANIEDU<span className="text-gradient">HUB</span></h2><p className="text-3xl text-slate-400 italic font-light">"Ignite Your Curiosity, Master the Science of Healing."</p><button onClick={() => onNav('subject')} className="px-16 py-6 bg-primary text-white rounded-full font-black text-2xl shadow-3xl">Start Learning</button></div>
                    </div>

            const [f, setF] = useState({});
            const [isUploading, setIsUploading] = useState(false);

            const handleAdminImage = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setIsUploading(true);
                try {
                    const url = await uploadToCloudinary(file);
                    setF({...data.aboutData, ...f, imageUrl: url});

                    setters.setSubjects(copy);

                        const copy = { ...data.quizzes };
                        if (!copy[f.s]) copy[f.s] = {};
                        if (!copy[f.s][f.u]) copy[f.s][f.u] = {};

                        setters.setQuizzes(copy);

                } else if (ed.target === 'library') {
                    const copy = { ...data.library };
                    if (ed.u === -1) { if(!copy[f.cat]) copy[f.cat] = []; copy[f.cat].push({ title: f.title, author: f.author, color: '#6366f1', url: f.url }); }
                    else { copy[f.cat][ed.u] = { title: f.title, author: f.author, color: f.color, url: f.url }; }

                } else if (ed.target === 'ai') {
                    if (ed.u === -1) setters.setAiLinks([...data.aiLinks, { ...f }]);
                    else { const copy = [...data.aiLinks]; copy[ed.u] = { ...f }; setters.setAiLinks(copy); }

                    setters.setAboutData({ ...data.aboutData, ...f });
                } else if (mode === 'lecture') {
                    setters.setVideoLink(f.link || data.videoLink);

                setEd({ u: null, target: null }); setF({});

                if (type === 'subject') { const copy = { ...data.subjects }; delete copy[idx]; setters.setSubjects(copy); }

            const sph = new THREE.Mesh(new THREE.IcosahedronGeometry(2, 0), new THREE.MeshPhongMaterial({ color: '#6366f1', wireframe: true, transparent: true, opacity: 0.1 })); s.add(sph);
            const l = new THREE.PointLight(0xffffff, 1); l.position.set(5, 5, 5); s.add(l); cam.position.z = 5;
            const onResize = () => {
                cam.aspect = window.innerWidth / window.innerHeight;
                cam.updateProjectionMatrix();
                r.setSize(window.innerWidth, window.innerHeight);
            };
            window.addEventListener('resize', onResize);
            function a() { requestAnimationFrame(a); sph.rotation.x += 0.001; sph.rotation.y += 0.002; r.render(s, cam); } a();
